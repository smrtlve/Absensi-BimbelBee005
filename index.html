<!doctype html>
<html lang="id" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Portal Absensi Les - Smart System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
      :root {
        --primary-color: #0084ff; --primary-hover: #0070d9; --bg-color: #f8fafd;
        --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
        --border-color: #e2e8f0; --sidebar-width: 260px;
      }
      body { font-family: "Nunito", sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }
      #sidebar { width: var(--sidebar-width); position: fixed; top: 0; left: 0; height: 100vh; background-color: var(--card-bg); border-right: 1px solid var(--border-color); z-index: 1040; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
      .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
      .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #3b82f6); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; }
      .nav-menu { padding: 1rem 0.75rem; flex-grow: 1; overflow-y: auto; }
      .nav-item { margin-bottom: 0.25rem; }
      .nav-link { color: var(--text-muted); padding: 0.8rem 1rem; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-weight: 600; text-decoration: none; }
      .nav-link:hover { background-color: rgba(0, 132, 255, 0.05); color: var(--primary-color); }
      .nav-link.active { background-color: var(--primary-color); color: white; }
      #main-content { margin-left: var(--sidebar-width); min-height: 100vh; display: flex; flex-direction: column; }
      .top-header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1030; }
      .content-area { padding: 1.5rem; flex-grow: 1; padding-bottom: 90px; }
      .custom-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 1.5rem; overflow: hidden; }
      .card-header-custom { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); background-color: rgba(0, 0, 0, 0.02); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
      .stat-card { padding: 1.5rem; border-radius: 16px; color: white; position: relative; overflow: hidden; }
      .stat-card.blue { background: linear-gradient(135deg, #0084ff, #3b82f6); }
      .stat-card.green { background: linear-gradient(135deg, #10b981, #059669); }
      .form-control, .form-select { background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.6rem 1rem; }
      .input-icon-wrapper { position: relative; width: 100%; }
      .input-icon-wrapper i { position: absolute; top: 50%; transform: translateY(-50%); left: 1rem; color: var(--text-muted); z-index: 5; }
      .input-icon-wrapper .form-control { padding-left: 2.75rem; }
      .table th { background-color: rgba(0, 0, 0, 0.02); font-weight: 600; padding: 1rem; }
      .table td { padding: 1rem; vertical-align: middle; }
      
      #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
      
      #reader-container { display: none; position: relative; width: 100%; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; border: 3px solid var(--primary-color); background: #000; }
      #video { width: 100%; height: auto; display: block; }
      .scan-line { position: absolute; width: 100%; height: 3px; background: #00ff00; top: 50%; left: 0; box-shadow: 0 0 15px #00ff00; animation: scan 2s infinite linear; }
      @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
      
      @media (max-width: 768px) {
        #sidebar { transform: translateX(-100%); z-index: 1060; }
        #sidebar.show { transform: translateX(0); }
        #main-content { margin-left: 0; }
      }
    </style>
  </head>
  <body>
    <!-- LOADING SCREEN -->
    <div id="loadingOverlay">
      <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
      <h5 class="fw-bold">Menghubungkan ke API...</h5>
      <p class="text-muted small" id="loadingText">Mengambil data dari Google Server</p>
    </div>

    <datalist id="listSiswaSuggestion"></datalist>

    <!-- PORTAL WALI -->
    <div id="portal-wali" class="min-vh-100 position-relative" style="background: var(--bg-color)">
      <div class="p-3 d-flex justify-content-between align-items-center bg-transparent position-absolute w-100 z-3">
        <div class="d-flex align-items-center gap-2">
          <div class="brand-icon" style="width: 35px; height: 35px"><i class="bi bi-rocket-takeoff-fill"></i></div>
          <h5 class="m-0 fw-bold">Smart<span class="text-primary">Absen</span></h5>
        </div>
        <button class="btn btn-outline-primary rounded-pill px-4 fw-bold" onclick="showAdminLogin()"><i class="bi bi-person-lock"></i> Login Admin</button>
      </div>

      <div id="pw-search-view" class="min-vh-100 d-flex align-items-center justify-content-center flex-column px-3 pt-5">
        <div class="text-center mb-5">
          <img src="https://cdn-icons-png.flaticon.com/512/3238/3238015.png" width="120" class="mb-3 opacity-75" />
          <h2 class="fw-bold">Pantau Kehadiran</h2>
        </div>
        <div class="custom-card p-4 shadow-sm" style="max-width: 500px; width: 100%">
          <div class="input-icon-wrapper mb-3">
            <i class="bi bi-search"></i>
            <input type="text" id="inputCariWali" list="listSiswaSuggestion" class="form-control" placeholder="Ketik nama siswa..." />
          </div>
          <button class="btn btn-primary w-100 py-2 fw-bold fs-5" onclick="cariDataWali()">Cari Data</button>
        </div>
      </div>

      <div id="pw-detail-view" class="d-none min-vh-100 w-100 pt-5 px-3 pb-5" style="max-width: 1000px; margin: 0 auto; padding-top: 80px !important">
        <button class="btn btn-light mb-4" onclick="kembaliKeSearch()"><i class="bi bi-arrow-left"></i> Kembali</button>
        <div class="row g-4 mb-4">
          <div class="col-md-7">
            <div class="custom-card p-4 h-100 d-flex align-items-center gap-4">
              <img src="" class="rounded border p-1" width="80" id="pw-qr" />
              <div><h3 class="fw-bold m-0" id="pw-nama">-</h3><p class="text-muted m-0">ID: <span id="pw-id">-</span></p></div>
            </div>
          </div>
          <div class="col-md-5">
            <div class="custom-card p-4 h-100 d-flex flex-column justify-content-center">
              <label class="fw-bold mb-2">Bulan</label>
              <input type="month" class="form-control form-control-lg" id="pw-filter-bulan" onchange="renderDataWali()" />
            </div>
          </div>
        </div>
        <div class="row g-3 mb-4">
          <div class="col-md-4"><div class="custom-card p-3 border-start border-4 border-primary"><p class="text-muted mb-1 small">Reguler</p><h3 class="m-0 fw-bold" id="pw-sum-reguler">Rp 0</h3></div></div>
          <div class="col-md-4"><div class="custom-card p-3 border-start border-4 border-warning"><p class="text-muted mb-1 small">Overtime</p><h3 class="m-0 fw-bold" id="pw-sum-overtime">Rp 0</h3></div></div>
          <div class="col-md-4"><div class="custom-card p-3 border-start border-4 border-danger"><p class="text-danger mb-1 small">Total</p><h3 class="m-0 fw-bold text-danger" id="pw-sum-total">Rp 0</h3></div></div>
        </div>
        <div class="custom-card">
          <div class="table-responsive">
            <table class="table table-hover">
              <thead><tr><th>Waktu</th><th>Tipe</th><th>Tarif</th></tr></thead>
              <tbody id="pw-tabel-rincian"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- PORTAL ADMIN -->
    <div id="portal-admin" class="d-none">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="brand-icon"><i class="bi bi-rocket-takeoff-fill"></i></div>
          <h5 class="m-0 fw-bold">Admin</h5>
        </div>
        <div class="nav-menu">
          <div class="nav-item"><a href="#" class="nav-link active" onclick="switchMenu('menu-dashboard', this)"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></div>
          <div class="nav-item"><a href="#" class="nav-link" onclick="switchMenu('menu-absen', this)"><i class="bi bi-qr-code-scan"></i> Scanner</a></div>
          <div class="nav-item"><a href="#" class="nav-link" onclick="switchMenu('menu-siswa', this)"><i class="bi bi-people-fill"></i> Siswa</a></div>
          <div class="nav-item"><a href="#" class="nav-link text-danger" onclick="logoutAdmin()"><i class="bi bi-box-arrow-left"></i> Logout</a></div>
        </div>
      </aside>

      <main id="main-content">
        <div class="content-area">
          <div id="menu-dashboard" class="menu-section">
            <div class="row g-4 mb-4">
              <div class="col-6"><div class="stat-card blue"><h6 class="mb-1">Total Siswa</h6><h3 class="m-0" id="dash-siswa">0</h3></div></div>
              <div class="col-6"><div class="stat-card green"><h6 class="mb-1">Total Absen</h6><h3 class="m-0" id="dash-absen">0</h3></div></div>
            </div>
            <div class="custom-card">
              <div class="card-header-custom">Aktivitas Terakhir</div>
              <table class="table"><tbody id="dash-aktivitas"></tbody></table>
            </div>
          </div>

          <div id="menu-absen" class="menu-section d-none">
             <div class="custom-card p-4 text-center">
                 <button class="btn btn-primary mb-3 w-100" onclick="initScanner()" id="btnMulaiKamera">Mulai Kamera QR</button>
                 <button class="btn btn-danger mb-3 w-100 d-none" onclick="stopScanner()" id="btnStopKamera">Tutup Kamera</button>
                 
                 <div id="reader-container">
                    <video id="video" playsinline></video><div class="scan-line"></div>
                 </div>
                 <canvas id="canvasElement" hidden></canvas>

                 <hr>
                 <input type="text" id="manualSiswa" list="listSiswaSuggestion" class="form-control mb-2" placeholder="Nama Siswa">
                 <select id="manualTipe" class="form-control mb-3"><option value="Hadir">Hadir</option><option value="Overtime">Overtime</option></select>
                 <button class="btn btn-dark w-100" onclick="simpanManual()">Catat Manual</button>
             </div>
          </div>

          <div id="menu-siswa" class="menu-section d-none">
             <div class="custom-card">
                 <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>ID</th><th>Nama</th><th>Wali/HP</th><th>Jenjang</th></tr></thead>
                        <tbody id="body-tabel-siswa"></tbody>
                    </table>
                 </div>
             </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // =======================================================================
      // 1. GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE APPS SCRIPT-MU !!!
      // =======================================================================
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzOtDFXKL1CZkyTsGOZd5fSVLvJjiMGRB9jvAZMl5TRDtJI7R5bMBXhvaQqEnJE-Kpy/exec";
      
      let dataSiswa = [], dataTarif = [], dataLog = [];

      window.onload = function () {
        document.getElementById("pw-filter-bulan").value = new Date().toISOString().slice(0, 7);
        fetchBackendData();
      };

      // FUNGSI KOMUNIKASI FETCH API (Pengganti google.script.run)
      async function apiCall(action, payload = {}) {
        try {
            // Menggunakan method POST dan mengubah object JSON menjadi string
            // Kita tidak menggunakan Content-Type application/json agar tidak terblokir CORS preflight
            const response = await fetch(GAS_API_URL, {
                method: "POST",
                body: JSON.stringify({ action: action, ...payload })
            });
            const result = await response.json();
            if (result.status === "error") throw new Error(result.message);
            return result.data;
        } catch (error) {
            console.error("API Error:", error);
            throw error;
        }
      }

      async function fetchBackendData() {
        try {
            const data = await apiCall("getAppData");
            dataSiswa = data.siswa || [];
            dataTarif = data.tarif || [];
            dataLog = data.log || [];
            
            document.getElementById("loadingOverlay").style.display = "none";
            renderSuggestions(); renderTabelSiswa(); renderDashboard();
        } catch (error) {
            document.getElementById("loadingOverlay").innerHTML = `
              <div class="text-danger text-center px-4">
                <i class="bi bi-x-octagon-fill" style="font-size: 3rem;"></i>
                <h5 class="mt-3 fw-bold">Gagal Terhubung API</h5>
                <p class="text-muted">${error.message}</p>
                <button class="btn btn-outline-danger mt-2" onclick="location.reload()">Muat Ulang</button>
              </div>`;
        }
      }

      // --- RENDER UI ---
      function renderSuggestions() {
        const dlist = document.getElementById("listSiswaSuggestion"); dlist.innerHTML = "";
        dataSiswa.forEach(s => dlist.innerHTML += `<option value="${s.nama}">ID: ${s.id}</option>`);
      }
      function renderTabelSiswa() {
        const tbody = document.getElementById("body-tabel-siswa"); tbody.innerHTML = "";
        dataSiswa.forEach(s => tbody.innerHTML += `<tr><td>${s.id}</td><td class="fw-bold">${s.nama}</td><td>${s.wali}<br><small>${s.hp}</small></td><td>${s.jenjang}</td></tr>`);
      }
      function renderDashboard() {
         document.getElementById("dash-siswa").innerText = dataSiswa.length;
         document.getElementById("dash-absen").innerText = dataLog.length;
         const tbody = document.getElementById("dash-aktivitas"); tbody.innerHTML = "";
         dataLog.slice(-5).reverse().forEach(l => {
             let b = l.status === "Hadir" ? "success" : "warning";
             tbody.innerHTML += `<tr><td><div class="fw-bold">${l.nama}</div><small class="text-muted">${l.tgl}</small></td><td class="text-end"><span class="badge bg-${b}">${l.status}</span></td></tr>`;
         });
      }

      // --- PORTAL WALI ---
      async function cariDataWali() {
        const input = document.getElementById("inputCariWali").value.trim();
        if (!input) return Swal.fire("Oops", "Masukkan Nama!", "warning");
        const siswa = dataSiswa.find(s => s.nama.toLowerCase() === input.toLowerCase() || s.id.toLowerCase() === input.toLowerCase());
        if (!siswa) return Swal.fire("Tidak Ditemukan", "Nama tidak terdaftar.", "error");

        const { value: pin } = await Swal.fire({ title: "PIN", input: "password", showCancelButton: true });
        if (!pin) return; 
        if (pin !== siswa.pin) return Swal.fire("Oops", "PIN Salah!", "error");

        document.getElementById("pw-nama").innerText = siswa.nama;
        document.getElementById("pw-id").innerText = siswa.id;
        document.getElementById("pw-qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${siswa.id}`;
        document.getElementById("pw-search-view").classList.add("d-none");
        document.getElementById("pw-detail-view").classList.remove("d-none");
        renderDataWali();
      }

      function renderDataWali() {
        const nama = document.getElementById("pw-nama").innerText;
        const bln = document.getElementById("pw-filter-bulan").value;
        const tbody = document.getElementById("pw-tabel-rincian"); tbody.innerHTML = "";
        let sReg = 0, sOver = 0;
        dataLog.filter(l => l.nama === nama && l.bulan === bln).forEach(l => {
            sReg += l.reg; sOver += l.over;
            let tar = l.status === "Hadir" ? l.reg : l.over;
            tbody.innerHTML += `<tr><td class="fw-bold">${l.hari}, ${l.tgl}</td><td><span class="badge bg-${l.status === "Hadir" ? "success" : "warning"}">${l.status}</span></td><td>Rp ${tar.toLocaleString("id-ID")}</td></tr>`;
        });
        document.getElementById("pw-sum-reguler").innerText = `Rp ${sReg.toLocaleString("id-ID")}`;
        document.getElementById("pw-sum-overtime").innerText = `Rp ${sOver.toLocaleString("id-ID")}`;
        document.getElementById("pw-sum-total").innerText = `Rp ${(sReg + sOver).toLocaleString("id-ID")}`;
      }
      function kembaliKeSearch() { document.getElementById("pw-detail-view").classList.add("d-none"); document.getElementById("pw-search-view").classList.remove("d-none"); }

      // --- ADMIN LOGIN ---
      async function showAdminLogin() {
          const { value: form } = await Swal.fire({
            title: 'Login', html: '<input id="su" class="swal2-input" placeholder="User"><input id="sp" type="password" class="swal2-input" placeholder="Pass">',
            preConfirm: () => [document.getElementById('su').value, document.getElementById('sp').value]
          });
          if (form) {
            Swal.fire({title: 'Memeriksa...', didOpen: () => Swal.showLoading()});
            try {
                const res = await apiCall("loginAdmin", { username: form[0], password: form[1] });
                if(res.auth) {
                    Swal.fire('Berhasil', '', 'success');
                    document.getElementById("portal-wali").classList.add("d-none");
                    document.getElementById("portal-admin").classList.remove("d-none");
                } else Swal.fire('Gagal', res.message, 'error');
            } catch (e) { Swal.fire('Error API', e.message, 'error'); }
          }
      }
      function logoutAdmin() { location.reload(); }
      function switchMenu(id, el) {
          document.querySelectorAll('.menu-section').forEach(m => m.classList.add('d-none'));
          document.getElementById(id).classList.remove('d-none');
          document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
          if(el) el.classList.add('active'); if(id !== 'menu-absen') stopScanner();
      }

      // --- SCANNER jsQR ---
      let videoElement = document.getElementById("video"); let canvasElement = document.getElementById("canvasElement");
      let canvas = canvasElement.getContext("2d", { willReadFrequently: true }); let scanning = false, streamTrack = null;

      function initScanner() {
        document.getElementById("btnMulaiKamera").classList.add("d-none"); document.getElementById("btnStopKamera").classList.remove("d-none");
        document.getElementById("reader-container").style.display = "block";
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
          streamTrack = stream; videoElement.srcObject = stream; videoElement.play(); scanning = true; requestAnimationFrame(tick);
        }).catch(err => Swal.fire("Error", "Akses kamera ditolak.", "error"));
      }

      function tick() {
        if (!scanning) return;
        if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
          canvasElement.height = videoElement.videoHeight; canvasElement.width = videoElement.videoWidth;
          canvas.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
          let imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
          let code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
          if (code && code.data) { stopScanner(); simpanAbsenKeDatabase(code.data, 'Hadir'); return; }
        }
        requestAnimationFrame(tick);
      }
      function stopScanner() { scanning = false; if (streamTrack) streamTrack.getTracks().forEach(t => t.stop()); document.getElementById("reader-container").style.display = "none"; document.getElementById("btnMulaiKamera").classList.remove("d-none"); document.getElementById("btnStopKamera").classList.add("d-none"); }

      function simpanManual() {
         const nama = document.getElementById("manualSiswa").value; const tipe = document.getElementById("manualTipe").value;
         if(!nama) return Swal.fire("Oops", "Isi Nama Siswa!", "warning");
         simpanAbsenKeDatabase(nama, tipe);
      }

      async function simpanAbsenKeDatabase(idAtauNama, tipe) {
          Swal.fire({title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
          try {
              const res = await apiCall("catatKehadiran", { idAtauNama: idAtauNama, tipe: tipe });
              Swal.fire('Sukses', res.message, 'success').then(() => {
                  document.getElementById("loadingOverlay").style.display = "flex";
                  fetchBackendData(); // Ambil data terbaru
              });
          } catch(e) { Swal.fire('Gagal', e.message, 'error'); }
      }
    </script>
  </body>
</html>
